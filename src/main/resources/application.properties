spring.application.name=test-dev

# Port configuration
server.port=${PORT:8081}

# Logging configuration
logging.level.org.springframework=INFO
logging.level.com.example=DEBUG

# Security configuration
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASSWORD:admin123}

# JWT configuration
jwt.secret=${JWT_SECRET:${JWT.SECRET:}}
jwt.expiration=${JWT_EXPIRATION:${JWT.EXPIRATION:3600000}}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:${MYSQLHOST:localhost}}:${DB_PORT:${MYSQLPORT:3306}}/${DB_NAME:${MYSQLDATABASE:test_dev}}}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:}}

# JPA configuration 
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuration for Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

